version: '3.8'

services:
  app:
    build: .
    ports:
      - "3000:3000"

    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules

    environment:
      - NODE_ENV=development
      - PORT=3000
      - DATABASE_PATH=/usr/src/app/data/blog.db

    command: npm run dev

    healthcheck:
      test: ["CMD","curl","--fail","http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s